name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "src/**"
      - "requirements.txt"
      - "docker-compose.db.yml"
      - "docker-compose.backend.yml"
      - ".github/workflows/deploy-backend.yml"

env:
  IMAGE: ghcr.io/serhatkeskin/rag-explorer/backend

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build

    # Deploys to the demo-maker infra (demo-host). The compose project lives at
    # /opt/demos/rag on the host (managed there, not from this repo). The backend
    # image is public on GHCR, so no registry login is needed to pull.
    steps:
      - name: Pull latest image and restart backend on demo-host
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          proxy_host: ${{ secrets.PROXY_HOST }}
          proxy_port: ${{ secrets.PROXY_PORT }}
          proxy_username: ${{ secrets.PROXY_USER }}
          proxy_key: ${{ secrets.PROXY_SSH_KEY }}
          script: |
            cd /opt/demos/rag
            docker compose pull backend
            docker compose up -d backend
            docker image prune -f
