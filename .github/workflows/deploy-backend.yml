name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "src/**"
      - "requirements.txt"
      - "docker-compose.db.yml"
      - "docker-compose.backend.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy changed files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          proxy_host: ${{ secrets.PROXY_HOST }}
          proxy_port: ${{ secrets.PROXY_PORT }}
          proxy_username: ${{ secrets.PROXY_USER }}
          proxy_key: ${{ secrets.PROXY_SSH_KEY }}
          source: "backend/,src/,requirements.txt,docker-compose.db.yml,docker-compose.backend.yml"
          target: "~/rag"
          strip_components: 0

      - name: Rebuild and restart backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          proxy_host: ${{ secrets.PROXY_HOST }}
          proxy_port: ${{ secrets.PROXY_PORT }}
          proxy_username: ${{ secrets.PROXY_USER }}
          proxy_key: ${{ secrets.PROXY_SSH_KEY }}
          script: |
            cd ~/rag
            docker compose -f docker-compose.db.yml -f docker-compose.backend.yml up -d --build backend
